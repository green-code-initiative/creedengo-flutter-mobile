name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["11", "17"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Upload plugin JAR
        if: matrix.java == '11'
        uses: actions/upload-artifact@v7
        with:
          name: creedengo-flutter-plugin
          path: target/creedengo-flutter-*.jar
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-java${{ matrix.java }}
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: SonarQube Scan
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "⚠️ SONAR_TOKEN is not set (Dependabot PR or external fork). Skipping SonarQube scan."
          else
            mvn -e -B sonar:sonar -Dsonar.projectKey=green-code-initiative_creedengo-flutter-mobile -Dsonar.organization=green-code-initiative
          fi
