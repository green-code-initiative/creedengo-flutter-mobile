services:
  sonarqube-db:
    image: postgres:16-alpine
    container_name: creedengo-sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - sonarnet
    restart: unless-stopped

  sonarqube:
    image: sonarqube:10.3-community
    container_name: creedengo-sonarqube
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - ./target/creedengo-flutter-1.0.0-SNAPSHOT.jar:/opt/sonarqube/extensions/plugins/creedengo-flutter-1.0.0-SNAPSHOT.jar:ro
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ports:
      - "9000:9000"
    networks:
      - sonarnet
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:5
    container_name: creedengo-sonar-scanner
    profiles:
      - scanner
    depends_on:
      - sonarqube
    volumes:
      - ./flutter-test-project:/usr/src
    networks:
      - sonarnet
    command: >
      -Dsonar.projectKey=flutter-test-creedengo
      -Dsonar.sources=lib
      -Dsonar.host.url=http://sonarqube:9000
      -Dsonar.login=admin
      -Dsonar.password=admin

volumes:
  postgresql_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  sonarnet:
    driver: bridge
